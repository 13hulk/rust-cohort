repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --manifest-path rust-json-parser/Cargo.toml --
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --manifest-path rust-json-parser/Cargo.toml -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false

      - id: ruff-format
        name: ruff format
        entry: uv run --project rust-json-parser ruff format
        language: system
        types: [python]
        pass_filenames: true

      - id: ruff-lint
        name: ruff lint
        entry: uv run --project rust-json-parser ruff check --fix
        language: system
        types: [python]
        pass_filenames: true
